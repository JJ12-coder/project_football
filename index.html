<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best vs Worst Super Bowl Winner</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 30px;
            background-color: #f4f6f8;
        }

        h1, h2 {
            text-align: center;
        }

        .tables {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .table-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
            width: 550px;
        }

        .team-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .team-header img {
            width: 60px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        tr:nth-child(even) {
            background-color: #f9fafb;
        }

        td:first-child {
            font-weight: bold;
        }

        select {
            margin-top: 10px;
            padding: 5px;
            width: 100%;
        }
    </style>
</head>

<body>

<h1>Best vs Worst Super Bowl Winner</h1>

<div class="tables">
    <div class="table-card">
        <div class="team-header">
            <img src="https://upload.wikimedia.org/wikipedia/en/3/37/Miami_Dolphins_logo.svg">
            <h2>1972 Miami Dolphins</h2>
        </div>
        <table id="best-table"><tbody></tbody></table>
    </div>

    <div class="table-card">
        <div class="team-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/60/New_York_Giants_logo.svg">
            <h2>2011 New York Giants</h2>
        </div>
        <table id="worst-table"><tbody></tbody></table>
    </div>
</div>

<h2 style="margin-top:40px;">Key Player Stats</h2>

<div class="tables">
    <div class="table-card">
        <h3>Dolphins Players</h3>

        <select id="best-player" onchange="loadPlayer(bestPlayers, 'best-player', 'best-player-table')">
            <option value="0">Larry Csonka</option>
            <option value="1">Bob Griese</option>
            <option value="2">Paul Warfield</option>
        </select>

        <table id="best-player-table"><tbody></tbody></table>
    </div>

    <div class="table-card">
        <h3>Giants Players</h3>

        <select id="worst-player" onchange="loadPlayer(worstPlayers, 'worst-player', 'worst-player-table')">
            <option value="0">Eli Manning</option>
            <option value="1">Victor Cruz</option>
            <option value="2">Jason Pierre-Paul</option>
        </select>

        <table id="worst-player-table"><tbody></tbody></table>
    </div>
</div>

<script>
const best = {
    record: "14-0",
    winPct: 1.000,
    pointsFor: 27.5,
    pointsAgainst: 12.2,
    pointDifferential: 252,
    playoffRecord: "3-0",
    totalRecord: "17-0",
    turnoverMargin: 12
};

const worst = {
    record: "9-7",
    winPct: 0.563,
    pointsFor: 24.6,
    pointsAgainst: 25.0,
    pointDifferential: -6,
    playoffRecord: "4-0",
    totalRecord: "13-7",
    turnoverMargin: -7
};

function loadTeam(team, tableId) {
    const tbody = document.querySelector(`#${tableId} tbody`);

    const rows = [
        ["Record", team.record],
        ["Win %", team.winPct],
        ["Points/Game", team.pointsFor],
        ["Points Allowed", team.pointsAgainst],
        ["Point Differential", team.pointDifferential],
        ["Playoff Record", team.playoffRecord],
        ["Total Record", team.totalRecord],
        ["Turnover Margin", team.turnoverMargin]
    ];

    rows.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${row[0]}</td><td>${row[1]}</td>`;
        tbody.appendChild(tr);
    });
}

const bestPlayers = [
    {
        name: "Larry Csonka",
        position: "RB",
        stats: [
            ["Rushing Yards", 1117],
            ["Rushing TD", 6],
            ["Receiving Yards", 154]
        ]
    },
    {
        name: "Bob Griese",
        position: "QB",
        stats: [
            ["Passing Yards", 1516],
            ["Passing TD", 12],
            ["INT", 7]
        ]
    },
    {
        name: "Paul Warfield",
        position: "WR",
        stats: [
            ["Receiving Yards", 606],
            ["TD", 3],
            ["Receptions", 29]
        ]
    }
];

const worstPlayers = [
    {
        name: "Eli Manning",
        position: "QB",
        stats: [
            ["Passing Yards", 4933],
            ["Passing TD", 29],
            ["INT", 16]
        ]
    },
    {
        name: "Victor Cruz",
        position: "WR",
        stats: [
            ["Receiving Yards", 1536],
            ["TD", 9],
            ["Receptions", 82]
        ]
    },
    {
        name: "Jason Pierre-Paul",
        position: "DE",
        stats: [
            ["Sacks", 16.5],
            ["Tackles", 86],
            ["Forced Fumbles", 2]
        ]
    }
];

function loadPlayer(players, selectId, tableId) {
    const index = document.getElementById(selectId).value;
    const player = players[index];
    const tbody = document.querySelector(`#${tableId} tbody`);
    tbody.innerHTML = "";

    const rows = [
        ["Name", player.name],
        ["Position", player.position],
        ...player.stats
    ];

    rows.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${row[0]}</td><td>${row[1]}</td>`;
        tbody.appendChild(tr);
    });
}

loadTeam(best, "best-table");
loadTeam(worst, "worst-table");

loadPlayer(bestPlayers, "best-player", "best-player-table");
loadPlayer(worstPlayers, "worst-player", "worst-player-table");
</script>

</body>
</html>
